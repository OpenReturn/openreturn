services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: openreturn
      POSTGRES_USER: openreturn
      POSTGRES_PASSWORD: openreturn
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openreturn -d openreturn"]
      interval: 10s
      timeout: 5s
      retries: 5

  mailpit:
    image: axllent/mailpit:v1.18
    ports:
      - "1025:1025"
      - "8025:8025"

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file: .env.example
    environment:
      DATABASE_URL: postgresql://openreturn:openreturn@postgres:5432/openreturn?schema=public
      SMTP_HOST: mailpit
    ports:
      - "4000:4000"
    command: >
      sh -c "pnpm --filter @openreturn/api prisma:migrate &&
      pnpm --filter @openreturn/api start"
    depends_on:
      postgres:
        condition: service_healthy
      mailpit:
        condition: service_started

  mcp-server:
    build:
      context: .
      dockerfile: apps/mcp-server/Dockerfile
    environment:
      OPENRETURN_API_BASE_URL: http://api:4000
      OAUTH_TOKEN_SECRET: replace-with-at-least-32-characters
      MCP_HTTP_PORT: 4100
    ports:
      - "4100:4100"
    depends_on:
      - api

  portal:
    build:
      context: .
      dockerfile: apps/portal/Dockerfile
    environment:
      OPENRETURN_API_BASE_URL: http://api:4000
      NEXT_PUBLIC_OPENRETURN_API_BASE_URL: http://localhost:4000
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  postgres_data:
